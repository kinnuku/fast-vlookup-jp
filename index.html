<meta charset="UTF-8">
<title>fast-vlookup</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="shortcut icon" href="favicon.ico">
<style>
  :root {
    --bg: #ffffff;
    --bg-secondary: #f7f6f3;
    --bg-tertiary: #f0eee8;
    --text: #1a1a1a;
    --text-secondary: #6b6b6b;
    --text-tertiary: #999999;
    --border: rgba(0,0,0,0.12);
    --border-strong: rgba(0,0,0,0.25);
    --accent: #c96442;
    --accent-bg: #faece7;
    --accent-text: #712b13;
    --success: #0f6e56;
    --success-bg: #e1f5ee;
    --danger: #a32d2d;
    --danger-bg: #fcebeb;
    --info-bg: #e6f1fb;
    --info-text: #0c447c;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1f1f1e;
      --bg-secondary: #2a2a29;
      --bg-tertiary: #2a2a29;
      --text: #f0f0ee;
      --text-secondary: #b0b0ae;
      --text-tertiary: #888885;
      --border: rgba(255,255,255,0.14);
      --border-strong: rgba(255,255,255,0.28);
      --accent: #d85a30;
      --accent-bg: #4a1b0c;
      --accent-text: #f0997b;
      --success-bg: #085041;
      --danger-bg: #501313;
      --info-bg: #042c53;
      --info-text: #b5d4f4;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }
  h1 {
    font-size: 26px;
    font-weight: 500;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }
  .subtitle {
    color: var(--text-secondary);
    font-size: 14px;
    margin: 0 0 8px;
  }
  .privacy-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--success-bg);
    color: var(--success);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    margin-bottom: 2rem;
  }
  @media (prefers-color-scheme: dark) {
    .privacy-badge { color: #5dcaa5; }
  }
  .step {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }
  .step-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
  }
  .step-num {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--text);
    color: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 500;
  }
  .step-title {
    font-size: 15px;
    font-weight: 500;
  }
  .step-hint {
    color: var(--text-secondary);
    font-size: 13px;
    margin: 0 0 12px;
  }
  .file-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 640px) {
    .file-grid { grid-template-columns: 1fr; }
  }
  .file-drop {
    border: 1.5px dashed var(--border-strong);
    border-radius: 10px;
    padding: 1.25rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--bg-secondary);
  }
  .file-drop:hover { border-color: var(--accent); background: var(--accent-bg); }
  .file-drop.dragover { border-color: var(--accent); background: var(--accent-bg); }
  .file-drop.has-file { border-style: solid; border-color: var(--success); background: var(--success-bg); }
  .file-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 6px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .file-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    word-break: break-all;
    margin-top: 4px;
  }
  .file-meta {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  input[type="file"] { display: none; }
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 640px) {
    .controls { grid-template-columns: 1fr; }
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .field label {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 500;
  }
  select, input[type="text"] {
    background: var(--bg);
    color: var(--text);
    border: 0.5px solid var(--border-strong);
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  select:focus, input[type="text"]:focus { border-color: var(--accent); }
  select:disabled { opacity: 0.5; }
  .checkbox-row {
    display: flex;
    gap: 16px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .checkbox-row label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
  }
  .btn {
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.05s;
    font-family: inherit;
  }
  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-secondary {
    background: var(--bg);
    color: var(--text);
    border: 0.5px solid var(--border-strong);
  }
  .btn-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .status {
    font-size: 13px;
    color: var(--text-secondary);
  }
  .status.error { color: var(--danger); }
  .preview {
    margin-top: 1rem;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    overflow: auto;
    max-height: 300px;
    background: var(--bg);
  }
  table {
    border-collapse: collapse;
    width: 100%;
    font-size: 12px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  th, td {
    padding: 6px 10px;
    border-bottom: 0.5px solid var(--border);
    text-align: left;
    white-space: nowrap;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  th {
    background: var(--bg-tertiary);
    font-weight: 500;
    color: var(--text-secondary);
    position: sticky;
    top: 0;
    z-index: 1;
  }
  tr:last-child td { border-bottom: none; }
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 1rem;
  }
  @media (max-width: 640px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
  }
  .stat {
    background: var(--bg-secondary);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .stat-label {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .stat-value {
    font-size: 18px;
    font-weight: 500;
    margin-top: 2px;
  }
  .stat-value.success { color: var(--success); }
  @media (prefers-color-scheme: dark) {
    .stat-value.success { color: #5dcaa5; }
  }
  .stat-value.warn { color: var(--accent); }
  .hidden { display: none; }
  .divider {
    height: 1px;
    background: var(--border);
    margin: 1rem 0;
  }
  .col-pill {
    display: inline-block;
    background: var(--info-bg);
    color: var(--info-text);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 11px;
    font-family: ui-monospace, monospace;
    margin: 0 2px;
  }
  details {
    margin-top: 1rem;
    font-size: 13px;
  }
  summary {
    cursor: pointer;
    color: var(--text-secondary);
    font-weight: 500;
  }
  details[open] summary { margin-bottom: 8px; }
  .multiselect {
    border: 0.5px solid var(--border-strong);
    border-radius: 6px;
    padding: 6px;
    max-height: 140px;
    overflow-y: auto;
    background: var(--bg);
    font-size: 13px;
  }
  .multiselect label {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 6px;
    cursor: pointer;
    border-radius: 4px;
  }
  .multiselect label:hover { background: var(--bg-secondary); }
  .multiselect .empty {
    color: var(--text-tertiary);
    padding: 6px;
    font-size: 12px;
  }
</style>

<div class="container">
  <h1>VLOOKUP高速化ツール</h1>
  <p class="subtitle">2つのファイルをアップロードして、キー列で結合します。</p>
  <div class="privacy-badge">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    すべての処理はブラウザ内で完結。データは外部に送信されません
  </div>

  <!-- Step 1: File upload -->
  <div class="step">
    <div class="step-header">
      <div class="step-num">1</div>
      <div class="step-title">ファイルを読み込む</div>
    </div>
    <p class="step-hint">対応形式: Excel (.xlsx, .xls)、CSV、TSV。1行目をヘッダーとして扱います。</p>
    <div class="file-grid">
      <div>
        <div class="file-label">メインテーブル (左側)</div>
        <div class="file-drop" id="drop1" onclick="document.getElementById('file1').click()">
          <div id="drop1-content">
            <div style="font-size: 24px; color: var(--text-tertiary);">＋</div>
            <div style="font-size: 13px; color: var(--text-secondary); margin-top: 4px;">クリックまたはドラッグ&ドロップ</div>
          </div>
          <input type="file" id="file1" accept=".xlsx,.xls,.csv,.tsv,.txt">
        </div>
      </div>
      <div>
        <div class="file-label">参照テーブル (右側、引いてくる元)</div>
        <div class="file-drop" id="drop2" onclick="document.getElementById('file2').click()">
          <div id="drop2-content">
            <div style="font-size: 24px; color: var(--text-tertiary);">＋</div>
            <div style="font-size: 13px; color: var(--text-secondary); margin-top: 4px;">クリックまたはドラッグ&ドロップ</div>
          </div>
          <input type="file" id="file2" accept=".xlsx,.xls,.csv,.tsv,.txt">
        </div>
      </div>
    </div>
  </div>

  <!-- Step 2: Configuration -->
  <div class="step" id="step2" style="opacity: 0.5; pointer-events: none;">
    <div class="step-header">
      <div class="step-num">2</div>
      <div class="step-title">結合する列を選ぶ</div>
    </div>
    <div class="controls">
      <div class="field">
        <label>メインテーブルのキー列</label>
        <select id="key1" disabled></select>
      </div>
      <div class="field">
        <label>参照テーブルのキー列</label>
        <select id="key2" disabled></select>
      </div>
    </div>
    <div class="field" style="margin-top: 10px;">
      <label>参照テーブルから取得する列 (複数選択可)</label>
      <div class="multiselect" id="cols-to-fetch"><div class="empty">ファイルを読み込んでください</div></div>
    </div>
    <div class="checkbox-row">
      <label><input type="checkbox" id="opt-trim" checked> 前後の空白を無視</label>
      <label><input type="checkbox" id="opt-case"> 大文字小文字を区別しない</label>
      <label><input type="checkbox" id="opt-string" checked> 数値と文字列を同一視 (例: 123 = "123")</label>
    </div>
  </div>

  <!-- Step 3: Run -->
  <div class="step" id="step3" style="opacity: 0.5; pointer-events: none;">
    <div class="step-header">
      <div class="step-num">3</div>
      <div class="step-title">実行 & ダウンロード</div>
    </div>
    <div class="btn-row">
      <button class="btn" id="run-btn" disabled>結合を実行</button>
      <button class="btn btn-secondary hidden" id="download-xlsx">Excelで保存 (.xlsx)</button>
      <button class="btn btn-secondary hidden" id="download-csv">CSVで保存 (.csv)</button>
      <span class="status" id="status"></span>
    </div>

    <div id="result-area" class="hidden">
      <div class="divider"></div>
      <div class="stats">
        <div class="stat">
          <div class="stat-label">処理行数</div>
          <div class="stat-value" id="stat-rows">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">マッチ</div>
          <div class="stat-value success" id="stat-matched">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">未マッチ</div>
          <div class="stat-value warn" id="stat-unmatched">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">処理時間</div>
          <div class="stat-value" id="stat-time">—</div>
        </div>
      </div>
      <div class="step-hint">プレビュー (最初の100行)</div>
      <div class="preview" id="preview"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
(function() {
  'use strict';

  const state = {
    file1: null, // { name, headers: [], rows: [[]] }
    file2: null,
    result: null
  };

  // ---------- File reading ----------
  function readFile(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = () => reject(new Error('ファイル読込エラー'));
      reader.onload = (e) => {
        try {
          const data = new Uint8Array(e.target.result);
          // SheetJS handles xlsx, xls, csv, tsv, txt
          const wb = XLSX.read(data, { type: 'array', cellDates: false, raw: false });
          const sheetName = wb.SheetNames[0];
          const sheet = wb.Sheets[sheetName];
          const aoa = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '', blankrows: false, raw: false });
          if (!aoa.length) throw new Error('空のファイル');
          const headers = aoa[0].map((h, i) => String(h || `列${i+1}`));
          const rows = aoa.slice(1);
          resolve({ name: file.name, headers, rows, size: file.size });
        } catch (err) {
          reject(err);
        }
      };
      reader.readAsArrayBuffer(file);
    });
  }

  // ---------- UI helpers ----------
  function fmtBytes(b) {
    if (b < 1024) return b + ' B';
    if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
    return (b/1024/1024).toFixed(1) + ' MB';
  }

  function setupDrop(dropId, inputId, slot) {
    const drop = document.getElementById(dropId);
    const input = document.getElementById(inputId);

    drop.addEventListener('dragover', (e) => {
      e.preventDefault();
      drop.classList.add('dragover');
    });
    drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
    drop.addEventListener('drop', (e) => {
      e.preventDefault();
      drop.classList.remove('dragover');
      if (e.dataTransfer.files.length) {
        input.files = e.dataTransfer.files;
        handleFile(e.dataTransfer.files[0], slot, drop);
      }
    });
    input.addEventListener('change', (e) => {
      if (e.target.files.length) handleFile(e.target.files[0], slot, drop);
    });
  }

  async function handleFile(file, slot, dropEl) {
    const contentEl = dropEl.querySelector('[id$="-content"]');
    contentEl.innerHTML = '<div style="font-size: 13px; color: var(--text-secondary);">読み込み中...</div>';
    try {
      const parsed = await readFile(file);
      state[slot] = parsed;
      dropEl.classList.add('has-file');
      contentEl.innerHTML = `
        <div class="file-name">${escapeHtml(parsed.name)}</div>
        <div class="file-meta">${parsed.rows.length.toLocaleString()}行 · ${parsed.headers.length}列 · ${fmtBytes(parsed.size)}</div>
      `;
      updateStepStates();
    } catch (err) {
      dropEl.classList.remove('has-file');
      contentEl.innerHTML = `<div style="font-size: 13px; color: var(--danger);">エラー: ${escapeHtml(err.message)}</div>`;
      state[slot] = null;
    }
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function updateStepStates() {
    const both = state.file1 && state.file2;
    const step2 = document.getElementById('step2');
    const step3 = document.getElementById('step3');
    const key1 = document.getElementById('key1');
    const key2 = document.getElementById('key2');
    const colsBox = document.getElementById('cols-to-fetch');

    if (both) {
      step2.style.opacity = '1';
      step2.style.pointerEvents = 'auto';
      step3.style.opacity = '1';
      step3.style.pointerEvents = 'auto';
      key1.disabled = false;
      key2.disabled = false;
      document.getElementById('run-btn').disabled = false;

      // Populate key dropdowns
      key1.innerHTML = state.file1.headers.map((h, i) => `<option value="${i}">${escapeHtml(h)}</option>`).join('');
      key2.innerHTML = state.file2.headers.map((h, i) => `<option value="${i}">${escapeHtml(h)}</option>`).join('');

      // Auto-detect common column name
      autoMatchKeys();

      // Populate columns to fetch
      renderColsToFetch();
      key2.addEventListener('change', renderColsToFetch);
    } else {
      step2.style.opacity = '0.5';
      step2.style.pointerEvents = 'none';
      step3.style.opacity = '0.5';
      step3.style.pointerEvents = 'none';
      key1.disabled = true;
      key2.disabled = true;
      document.getElementById('run-btn').disabled = true;
    }
  }

  function autoMatchKeys() {
    // Try to find headers with same name
    const h1 = state.file1.headers.map(h => String(h).trim().toLowerCase());
    const h2 = state.file2.headers.map(h => String(h).trim().toLowerCase());
    for (let i = 0; i < h1.length; i++) {
      const j = h2.indexOf(h1[i]);
      if (j !== -1 && h1[i]) {
        document.getElementById('key1').value = i;
        document.getElementById('key2').value = j;
        return;
      }
    }
  }

  function renderColsToFetch() {
    const keyIdx = parseInt(document.getElementById('key2').value);
    const box = document.getElementById('cols-to-fetch');
    box.innerHTML = state.file2.headers.map((h, i) => {
      if (i === keyIdx) return '';
      return `<label><input type="checkbox" class="col-fetch" value="${i}" checked> ${escapeHtml(h)}</label>`;
    }).join('') || '<div class="empty">取得する列がありません</div>';
  }

  // ---------- Join logic ----------
  function normalizeKey(v, opts) {
    if (v == null) return '';
    let s = opts.string ? String(v) : v;
    if (typeof s === 'string') {
      if (opts.trim) s = s.trim();
      if (opts.caseInsensitive) s = s.toLowerCase();
    }
    return s;
  }

  function runJoin() {
    const startTime = performance.now();
    const statusEl = document.getElementById('status');
    statusEl.textContent = '処理中...';
    statusEl.classList.remove('error');

    // Defer to allow UI update
    setTimeout(() => {
      try {
        const key1Idx = parseInt(document.getElementById('key1').value);
        const key2Idx = parseInt(document.getElementById('key2').value);
        const opts = {
          trim: document.getElementById('opt-trim').checked,
          caseInsensitive: document.getElementById('opt-case').checked,
          string: document.getElementById('opt-string').checked
        };
        const fetchCols = Array.from(document.querySelectorAll('.col-fetch:checked'))
          .map(cb => parseInt(cb.value));

        // Build hash map from file2
        const lookup = new Map();
        const f2rows = state.file2.rows;
        for (let i = 0; i < f2rows.length; i++) {
          const key = normalizeKey(f2rows[i][key2Idx], opts);
          if (key === '') continue;
          // First-match wins (standard VLOOKUP behavior)
          if (!lookup.has(key)) lookup.set(key, f2rows[i]);
        }

        // Walk file1 and append
        const f1rows = state.file1.rows;
        const fetchHeaders = fetchCols.map(i => state.file2.headers[i]);
        const resultHeaders = [...state.file1.headers, ...fetchHeaders];
        const resultRows = new Array(f1rows.length);
        let matched = 0;
        for (let i = 0; i < f1rows.length; i++) {
          const key = normalizeKey(f1rows[i][key1Idx], opts);
          const match = key === '' ? null : lookup.get(key);
          const fetched = match
            ? fetchCols.map(c => match[c] != null ? match[c] : '')
            : fetchCols.map(() => '');
          if (match) matched++;
          // Build full row at fixed length
          const fullRow = new Array(resultHeaders.length);
          for (let j = 0; j < state.file1.headers.length; j++) {
            fullRow[j] = f1rows[i][j] != null ? f1rows[i][j] : '';
          }
          for (let j = 0; j < fetched.length; j++) {
            fullRow[state.file1.headers.length + j] = fetched[j];
          }
          resultRows[i] = fullRow;
        }

        const elapsed = performance.now() - startTime;
        state.result = { headers: resultHeaders, rows: resultRows, matched, total: f1rows.length, elapsed };

        renderResult();
        statusEl.textContent = '完了';
      } catch (err) {
        statusEl.textContent = 'エラー: ' + err.message;
        statusEl.classList.add('error');
      }
    }, 30);
  }

  function renderResult() {
    const r = state.result;
    document.getElementById('result-area').classList.remove('hidden');
    document.getElementById('download-xlsx').classList.remove('hidden');
    document.getElementById('download-csv').classList.remove('hidden');
    document.getElementById('stat-rows').textContent = r.total.toLocaleString();
    document.getElementById('stat-matched').textContent = r.matched.toLocaleString();
    document.getElementById('stat-unmatched').textContent = (r.total - r.matched).toLocaleString();
    document.getElementById('stat-time').textContent = r.elapsed < 1000
      ? Math.round(r.elapsed) + ' ms'
      : (r.elapsed / 1000).toFixed(2) + ' s';

    // Preview (first 100 rows)
    const previewRows = r.rows.slice(0, 100);
    const html = `<table>
      <thead><tr>${r.headers.map(h => `<th>${escapeHtml(h)}</th>`).join('')}</tr></thead>
      <tbody>${previewRows.map(row =>
        `<tr>${row.map(c => `<td>${escapeHtml(c)}</td>`).join('')}</tr>`
      ).join('')}</tbody>
    </table>`;
    document.getElementById('preview').innerHTML = html;
  }

  function downloadXlsx() {
    const r = state.result;
    const aoa = [r.headers, ...r.rows];
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '結果');
    XLSX.writeFile(wb, 'vlookup_結果.xlsx');
  }

  function downloadCsv() {
    const r = state.result;
    const esc = (v) => {
      const s = String(v == null ? '' : v);
      if (/[",\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
      return s;
    };
    const lines = [r.headers.map(esc).join(',')];
    for (let i = 0; i < r.rows.length; i++) {
      lines.push(r.rows[i].map(esc).join(','));
    }
    // BOM for Excel Japanese compatibility
    const blob = new Blob(['\uFEFF' + lines.join('\r\n')], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'vlookup_結果.csv';
    a.click();
    URL.revokeObjectURL(url);
  }

  // ---------- Initialize ----------
  setupDrop('drop1', 'file1', 'file1');
  setupDrop('drop2', 'file2', 'file2');
  document.getElementById('run-btn').addEventListener('click', runJoin);
  document.getElementById('download-xlsx').addEventListener('click', downloadXlsx);
  document.getElementById('download-csv').addEventListener('click', downloadCsv);
})();
</script>
